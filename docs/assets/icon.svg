<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="nosana-x402-gateway icon">
  <defs>
    <!-- Minted-coin light: a soft top-left highlight into a deeper violet base,
         so the USDC coin reads as a struck object, not a flat disc. -->
    <radialGradient id="coinFace" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#8f74c4"/>
      <stop offset="55%" stop-color="#6B4FA6"/>
      <stop offset="100%" stop-color="#583c90"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="#FBFAF5" stroke="#1C1917" stroke-opacity="0.12"/>
  <!-- GPU chip: the compute the payment buys -->
  <rect x="15" y="19" width="27" height="27" rx="5" fill="none" stroke="#1C1917" stroke-width="2.5"/>
  <rect x="24.5" y="28.5" width="8" height="8" rx="2" fill="#1C1917"/>
  <g fill="#1C1917">
    <rect x="20" y="13.5" width="2.6" height="5.5" rx="1.3"/>
    <rect x="27" y="13.5" width="2.6" height="5.5" rx="1.3"/>
    <rect x="34" y="13.5" width="2.6" height="5.5" rx="1.3"/>
    <rect x="20" y="46" width="2.6" height="5.5" rx="1.3"/>
    <rect x="27" y="46" width="2.6" height="5.5" rx="1.3"/>
    <rect x="34" y="46" width="2.6" height="5.5" rx="1.3"/>
    <rect x="9" y="24.7" width="5.5" height="2.6" rx="1.3"/>
    <rect x="9" y="31.7" width="5.5" height="2.6" rx="1.3"/>
    <rect x="9" y="38.7" width="5.5" height="2.6" rx="1.3"/>
  </g>
  <!-- USDC payment coin (this repo accent) overlapping the chip corner -->
  <circle cx="46" cy="20" r="11" fill="url(#coinFace)" stroke="#FBFAF5" stroke-width="3"/>
  <circle cx="46" cy="20" r="4.4" fill="none" stroke="#FBFAF5" stroke-width="2"/>
  <!-- specular sheen: one small highlight, upper-left, so the coin catches light -->
  <circle cx="42.6" cy="16.5" r="1.5" fill="#ffffff" fill-opacity="0.5"/>
</svg>
