<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 1490" width="1120" height="1490" role="img" aria-label="The x402 rent exchange field by field: the agent POSTs a rent request, the gateway answers 402 with x402 PaymentRequirements plus availability and a hint, the agent resends with a PAYMENT-SIGNATURE header carrying a signed USDC transfer, and the gateway returns 200 with the deployment id, a live service URL per exposed port, a session JWT, the settlement transaction, and next steps.">
  <defs>
    <radialGradient id="psGlow" cx="28%" cy="6%" r="95%">
      <stop offset="0%" stop-color="#9a5b13" stop-opacity="0.05"/>
      <stop offset="58%" stop-color="#9a5b13" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="psVign" cx="50%" cy="48%" r="72%">
      <stop offset="60%" stop-color="#1c1917" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1c1917" stop-opacity="0.055"/>
    </radialGradient>
    <filter id="psCard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1c1917" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1c1917" flood-opacity="0.10"/>
    </filter>
    <style>
      .serif { font-family: Georgia, "Iowan Old Style", "Times New Roman", serif; }
      .sans  { font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono  { font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, monospace; }
      .eyebrow { fill: #736e64; letter-spacing: 2.4px; }
      .ctitle { fill: #1c1917; }
      .csub { fill: #57534e; }
      .cap { fill: #57534e; }
      .jkey { fill: #1c1917; }
      .jstr { fill: #9a5b13; }
      .jnum { fill: #57534e; }
      .jpun { fill: #b0a99d; }
      .jnote { fill: #a8a29e; }
    </style>
  </defs>

  <!-- warm paper field -->
  <rect width="1120" height="1490" fill="#f4f1e9"/>
  <rect width="1120" height="1490" fill="url(#psGlow)"/>
  <rect width="1120" height="1490" fill="url(#psVign)"/>

  <!-- header -->
  <text class="mono eyebrow" x="66" y="66" font-size="12.5">NOSANA-X402-GATEWAY / PAYMENT SCHEMA</text>
  <text class="serif ctitle" x="65" y="106" font-size="30" font-weight="600">The x402 rent exchange, field by field</text>
  <text class="sans csub" x="66" y="134" font-size="15">Four messages turn an agent&#39;s USDC into a running GPU job. Every field name and shape below is real; long values are shortened.</text>
  <line x1="66" y1="156" x2="1054" y2="156" stroke="#1c1917" stroke-opacity="0.08" stroke-width="1"/>

  <!-- sequence rail: four messages, disc colour = who speaks (ink agent, violet
       gateway-402, green gateway-200) -->
  <line x1="40" y1="207" x2="40" y2="1079" stroke="#1c1917" stroke-opacity="0.12" stroke-width="1.5"/>
  <g class="mono" font-size="12.5" text-anchor="middle">
    <circle cx="40" cy="207" r="13" fill="#1c1917"/><text x="40" y="211.5" fill="#f4f1e9">1</text>
    <circle cx="40" cy="391" r="13" fill="#6b4fa6"/><text x="40" y="395.5" fill="#ffffff">2</text>
    <circle cx="40" cy="789" r="13" fill="#1c1917"/><text x="40" y="793.5" fill="#f4f1e9">3</text>
    <circle cx="40" cy="1079" r="13" fill="#25704f"/><text x="40" y="1083.5" fill="#ffffff">4</text>
  </g>

  <!-- ============ CARD 1: request ============ -->
  <g filter="url(#psCard)">
    <rect x="64" y="178" width="990" height="160" rx="16" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.08"/>
  </g>
  <rect x="64" y="178" width="5" height="160" rx="2.5" fill="#1c1917" fill-opacity="0.28"/>
  <!-- chips -->
  <rect x="90" y="196" width="168" height="23" rx="6" fill="#efece3" stroke="#1c1917" stroke-opacity="0.10"/>
  <text class="mono" x="102" y="212" font-size="11.5" letter-spacing="0.8" fill="#57534e">AGENT &#8594; GATEWAY</text>
  <rect x="948" y="196" width="106" height="23" rx="6" fill="#1c1917"/>
  <text class="mono" x="1001" y="212" font-size="11.5" fill="#f4f1e9" text-anchor="middle">POST /rent</text>
  <!-- json -->
  <text class="mono" x="98" y="252" font-size="15"><tspan class="jpun">{ </tspan><tspan class="jkey">"market"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"nvidia-3060"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"duration_minutes"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">60</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="278" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"job_definition"</tspan><tspan class="jpun">: { </tspan><tspan class="jnote">&#8230; Nosana job spec &#8230;</tspan><tspan class="jpun"> }, </tspan><tspan class="jkey">"require_available"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">false</tspan><tspan class="jpun"> }</tspan></text>
  <text class="sans cap" x="98" y="318" font-size="13.5">The agent says what to run and for how long. No account, no NOS, no Solana SDK.</text>

  <!-- ============ CARD 2: 402 ============ -->
  <g filter="url(#psCard)">
    <rect x="64" y="362" width="990" height="374" rx="16" fill="#fbfaf5" stroke="#6b4fa6" stroke-opacity="0.28"/>
  </g>
  <rect x="64" y="362" width="5" height="374" rx="2.5" fill="#6b4fa6"/>
  <rect x="90" y="380" width="170" height="23" rx="6" fill="#efece3" stroke="#1c1917" stroke-opacity="0.10"/>
  <text class="mono" x="102" y="396" font-size="11.5" letter-spacing="0.8" fill="#57534e">GATEWAY &#8594; AGENT</text>
  <rect x="808" y="380" width="90" height="23" rx="6" fill="#6b4fa6"/>
  <text class="mono" x="853" y="396" font-size="11.5" fill="#ffffff" text-anchor="middle">402</text>
  <rect x="906" y="380" width="148" height="23" rx="6" fill="#f0ebf6" stroke="#6b4fa6" stroke-opacity="0.45"/>
  <text class="mono" x="980" y="396" font-size="10.5" fill="#6b4fa6" text-anchor="middle">header PAYMENT-REQUIRED</text>
  <!-- json -->
  <text class="mono" x="98" y="434" font-size="15"><tspan class="jpun">{</tspan></text>
  <text class="mono" x="98" y="459" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"x402Version"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">2</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="484" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"accepts"</tspan><tspan class="jpun">: [ {</tspan></text>
  <text class="mono" x="98" y="509" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"scheme"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"exact"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"amount"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"43600"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono jnote" x="660" y="509" font-size="12.5">&#8592; USDC atomic units (6 decimals) = $0.0436 total</text>
  <text class="mono" x="98" y="534" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"asset"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"EPjFW&#8230;yTDt1v"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono jnote" x="660" y="534" font-size="12.5">&#8592; the USDC mint</text>
  <text class="mono" x="98" y="559" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"payTo"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"7BF8&#8230;jw7ABLw"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono jnote" x="660" y="559" font-size="12.5">&#8592; the gateway treasury</text>
  <text class="mono" x="98" y="584" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"network"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"solana"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"maxTimeoutSeconds"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">300</tspan><tspan class="jpun"> } ],</tspan></text>
  <text class="mono" x="98" y="609" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"availability"</tspan><tspan class="jpun">: { </tspan><tspan class="jkey">"status"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"nodes_available"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="634" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"nodes_available"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">7</tspan><tspan class="jpun"> },</tspan></text>
  <text class="mono jnote" x="660" y="634" font-size="12.5">&#8592; a host is idle: a paid job starts at once</text>
  <text class="mono" x="98" y="659" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"hint"</tspan><tspan class="jpun">: { </tspan><tspan class="jkey">"payment_header"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"PAYMENT-SIGNATURE"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="684" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"what"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"x402 challenge, not charged yet"</tspan><tspan class="jpun"> } }</tspan></text>
  <text class="sans cap" x="98" y="716" font-size="13.5">The price, the USDC mint, where to pay, whether a host is free now, and how to pay. No money has moved.</text>

  <!-- ============ CARD 3: paid retry ============ -->
  <g filter="url(#psCard)">
    <rect x="64" y="760" width="990" height="196" rx="16" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.08"/>
  </g>
  <rect x="64" y="760" width="5" height="196" rx="2.5" fill="#1c1917" fill-opacity="0.28"/>
  <rect x="90" y="778" width="168" height="23" rx="6" fill="#efece3" stroke="#1c1917" stroke-opacity="0.10"/>
  <text class="mono" x="102" y="794" font-size="11.5" letter-spacing="0.8" fill="#57534e">AGENT &#8594; GATEWAY</text>
  <rect x="784" y="778" width="106" height="23" rx="6" fill="#1c1917"/>
  <text class="mono" x="837" y="794" font-size="11.5" fill="#f4f1e9" text-anchor="middle">POST /rent</text>
  <rect x="898" y="778" width="156" height="23" rx="6" fill="#f0ebf6" stroke="#6b4fa6" stroke-opacity="0.45"/>
  <text class="mono" x="976" y="794" font-size="10.5" fill="#6b4fa6" text-anchor="middle">header PAYMENT-SIGNATURE</text>
  <!-- json -->
  <text class="mono jnote" x="98" y="832" font-size="13">the identical body from step 1, now carrying the payment header:</text>
  <text class="mono" x="98" y="862" font-size="15"><tspan class="jkey" fill="#6b4fa6">PAYMENT-SIGNATURE</tspan><tspan class="jpun">: </tspan><tspan class="jnote">base64(</tspan><tspan class="jpun"> { </tspan><tspan class="jkey">"x402Version"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">2</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="887" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"accepted"</tspan><tspan class="jpun">: { </tspan><tspan class="jkey">"amount"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"43600"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"payTo"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"7BF8&#8230;ABLw"</tspan><tspan class="jpun"> },</tspan></text>
  <text class="mono" x="98" y="912" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"payload"</tspan><tspan class="jpun">: { </tspan><tspan class="jnote">partially-signed USDC TransferChecked</tspan><tspan class="jpun"> } } )</tspan></text>
  <text class="sans cap" x="98" y="940" font-size="13.5">The agent signs; the PayAI facilitator co-signs the fee (gasless) and settles it on Solana.</text>

  <!-- ============ bridge: inside the gateway ============ -->
  <rect x="64" y="980" width="990" height="46" rx="12" fill="#6b4fa6" fill-opacity="0.05" stroke="#6b4fa6" stroke-opacity="0.22" stroke-dasharray="2 4" stroke-width="1"/>
  <text class="sans" x="88" y="1008" font-size="13.5" fill="#57534e"><tspan font-weight="600" fill="#6b4fa6">Inside the gateway</tspan> (see the architecture map):  verify  &#8594;  reserve (anti-replay)  &#8594;  settle USDC on Solana  &#8594;  pin + jobs.list on Nosana credits.</text>

  <!-- ============ CARD 4: 200 receipt ============ -->
  <g filter="url(#psCard)">
    <rect x="64" y="1050" width="990" height="256" rx="16" fill="#fbfaf5" stroke="#25704f" stroke-opacity="0.26"/>
  </g>
  <rect x="64" y="1050" width="5" height="256" rx="2.5" fill="#25704f"/>
  <rect x="90" y="1068" width="170" height="23" rx="6" fill="#efece3" stroke="#1c1917" stroke-opacity="0.10"/>
  <text class="mono" x="102" y="1084" font-size="11.5" letter-spacing="0.8" fill="#57534e">GATEWAY &#8594; AGENT</text>
  <rect x="924" y="1068" width="130" height="23" rx="6" fill="#25704f"/>
  <text class="mono" x="989" y="1084" font-size="11.5" fill="#ffffff" text-anchor="middle">200  session issued</text>
  <!-- json -->
  <text class="mono" x="98" y="1124" font-size="15"><tspan class="jpun">{ </tspan><tspan class="jkey">"deployment_id"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"9H4bVD1v&#8230;pV2Pj"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"status"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"QUEUED"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono" x="98" y="1149" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"endpoints"</tspan><tspan class="jpun">: [ { </tspan><tspan class="jkey">"url"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"https://qrDopp&#8230;.nos.ci"</tspan><tspan class="jpun">, </tspan><tspan class="jnote">&#8230;</tspan><tspan class="jpun"> } ],</tspan></text>
  <text class="mono jnote" x="660" y="1149" font-size="12.5">&#8592; a live URL per exposed port, once RUNNING</text>
  <text class="mono" x="98" y="1174" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"session"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"eyJhbGciOi&#8230;"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono jnote" x="660" y="1174" font-size="12.5">&#8592; HS256 JWT, scoped to this deployment</text>
  <text class="mono" x="98" y="1199" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"payment"</tspan><tspan class="jpun">: { </tspan><tspan class="jkey">"tx_signature"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"3dkKwc4B&#8230;j7K1s"</tspan><tspan class="jpun">,</tspan></text>
  <text class="mono jnote" x="660" y="1199" font-size="12.5">&#8592; settled on Solana mainnet</text>
  <text class="mono" x="98" y="1224" font-size="15"><tspan class="jpun">&#160;&#160;&#160;&#160;</tspan><tspan class="jkey">"amount_atomic"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"43600"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"amount_usd"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">0.0436</tspan><tspan class="jpun"> },</tspan></text>
  <text class="mono" x="98" y="1249" font-size="15"><tspan class="jpun">&#160;&#160;</tspan><tspan class="jkey">"next"</tspan><tspan class="jpun">: { </tspan><tspan class="jkey">"results"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"endpoints[] while RUNNING; batch by job id"</tspan><tspan class="jpun">, </tspan><tspan class="jnote">&#8230;</tspan><tspan class="jpun"> } }</tspan></text>
  <text class="sans cap" x="98" y="1286" font-size="13.5">The job id, its live service URL, a session bound to it, the on-chain receipt, and what to do next.</text>

  <!-- ============ footer: lifecycle ============ -->
  <text class="sans" x="66" y="1348" font-size="14" font-weight="600" fill="#1c1917">Then, session-authenticated (no more discovery, no more x402):</text>
  <text class="mono" x="66" y="1378" font-size="14"><tspan fill="#1c1917">GET /rent/:id</tspan><tspan class="jpun">  &#8594;  </tspan><tspan class="jpun">{ </tspan><tspan class="jkey">"status"</tspan><tspan class="jpun">: </tspan><tspan class="jstr">"RUNNING"</tspan><tspan class="jpun">, </tspan><tspan class="jkey">"timeout_minutes"</tspan><tspan class="jpun">: </tspan><tspan class="jnum">60</tspan><tspan class="jpun"> }</tspan></text>
  <text class="mono" x="66" y="1404" font-size="14"><tspan fill="#1c1917">POST /rent/:id/extend</tspan><tspan class="csub sans"> pays again for more minutes</tspan><tspan class="jpun">   &#183;   </tspan><tspan fill="#1c1917">POST /rent/:id/stop</tspan><tspan class="csub sans"> ends it</tspan></text>

  <!-- legend -->
  <g>
    <rect x="66" y="1436" width="13" height="13" rx="3" fill="#9a5b13" fill-opacity="0.30" stroke="#9a5b13" stroke-opacity="0.6"/>
    <text class="mono" x="86" y="1447" font-size="12" fill="#736e64">JSON string value</text>
    <rect x="240" y="1436" width="13" height="13" rx="3" fill="#6b4fa6" fill-opacity="0.26" stroke="#6b4fa6" stroke-opacity="0.6"/>
    <text class="mono" x="260" y="1447" font-size="12" fill="#736e64">this gateway / x402 protocol</text>
    <rect x="486" y="1436" width="13" height="13" rx="3" fill="#25704f" fill-opacity="0.24" stroke="#25704f" stroke-opacity="0.6"/>
    <text class="mono" x="506" y="1447" font-size="12" fill="#736e64">settled / session granted</text>
  </g>
</svg>
