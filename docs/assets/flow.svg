<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" width="1240" height="720" role="img" aria-label="Architecture: an AI agent pays USDC over HTTP to the x402 gateway (this repo), which settles the payment on Solana through the PayAI facilitator and provisions a job on Nosana's existing credits API, which runs it on a GPU host.">
  <defs>
    <radialGradient id="paperGlow" cx="30%" cy="8%" r="90%">
      <stop offset="0%" stop-color="#9a5b13" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#9a5b13" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paperVign" cx="50%" cy="50%" r="75%">
      <stop offset="62%" stop-color="#1c1917" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1c1917" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1c1917" flood-opacity="0.11"/>
    </filter>
    <marker id="tip" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#8a8178"/>
    </marker>
    <style>
      .serif { font-family: Georgia, "Iowan Old Style", "Times New Roman", serif; }
      .sans  { font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono  { font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, monospace; }
      .eyebrow { fill: #736e64; letter-spacing: 2.4px; }
      .zonelabel { fill: #57534e; letter-spacing: 1.4px; }
      .ctitle { fill: #1c1917; }
      .csub { fill: #57534e; }
      .steplabel { fill: #57534e; }
    </style>
  </defs>

  <!-- warm paper field -->
  <rect width="1240" height="720" rx="0" fill="#f4f1e9"/>
  <rect width="1240" height="720" fill="url(#paperGlow)"/>
  <rect width="1240" height="720" fill="url(#paperVign)"/>

  <!-- header -->
  <text class="mono eyebrow" x="56" y="70" font-size="12.5">NOSANA-X402-GATEWAY / ARCHITECTURE</text>
  <text class="serif ctitle" x="55" y="112" font-size="31" font-weight="600">How an agent&#39;s USDC becomes a Nosana GPU job</text>
  <line x1="56" y1="140" x2="1184" y2="140" stroke="#1c1917" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ============ zones ============ -->

  <!-- THIS REPO zone (accent) -->
  <rect x="344" y="196" width="306" height="212" rx="16" fill="#6b4fa6" fill-opacity="0.05" stroke="#6b4fa6" stroke-opacity="0.34" stroke-width="1.5"/>
  <rect x="360" y="184" width="150" height="24" rx="7" fill="#6b4fa6"/>
  <text class="mono" x="372" y="200" font-size="11" letter-spacing="1.2" fill="#ffffff">THIS REPO</text>

  <!-- SOLANA zone -->
  <rect x="344" y="470" width="306" height="150" rx="16" fill="#1c1917" fill-opacity="0.025" stroke="#1c1917" stroke-opacity="0.12" stroke-width="1.5"/>
  <rect x="360" y="458" width="176" height="24" rx="7" fill="#efece3" stroke="#1c1917" stroke-opacity="0.12"/>
  <text class="mono zonelabel" x="372" y="474" font-size="11">SOLANA / SETTLEMENT</text>

  <!-- NOSANA zone (existing, green) -->
  <rect x="700" y="196" width="484" height="424" rx="16" fill="#25704f" fill-opacity="0.045" stroke="#25704f" stroke-opacity="0.30" stroke-width="1.5"/>
  <rect x="716" y="184" width="360" height="24" rx="7" fill="#e5ede8" stroke="#25704f" stroke-opacity="0.30"/>
  <text class="mono" x="728" y="200" font-size="11" letter-spacing="1.1" fill="#25704f">NOSANA / EXISTING INFRASTRUCTURE, UNCHANGED</text>

  <!-- ============ wires (under cards) ============ -->
  <g fill="none" stroke-width="1.6" stroke="#b6ada0">
    <path d="M292 328 H352" marker-end="url(#tip)"/>
    <path d="M636 300 H726" marker-end="url(#tip)"/>
    <path d="M497 396 V470" marker-end="url(#tip)"/>
    <path d="M636 356 C 676 356, 690 430, 726 430" marker-end="url(#tip)"/>
    <path d="M942 476 V520" marker-end="url(#tip)"/>
  </g>

  <!-- ============ cards ============ -->

  <!-- agent -->
  <g filter="url(#cardShadow)">
    <rect x="56" y="272" width="236" height="118" rx="14" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.09"/>
  </g>
  <text class="sans ctitle" x="80" y="322" font-size="18" font-weight="600">AI agent</text>
  <text class="mono csub" x="80" y="348" font-size="12.5">USDC wallet, plain HTTP</text>

  <!-- gateway (hero, this repo) -->
  <g filter="url(#cardShadow)">
    <rect x="362" y="230" width="270" height="150" rx="14" fill="#fbfaf5" stroke="#6b4fa6" stroke-opacity="0.45"/>
  </g>
  <text class="sans ctitle" x="386" y="276" font-size="19" font-weight="600">x402 gateway</text>
  <text class="mono csub" x="386" y="303" font-size="12.5">prices the job</text>
  <text class="mono csub" x="386" y="326" font-size="12.5">settles the USDC</text>
  <text class="mono csub" x="386" y="349" font-size="12.5">provisions on credits</text>

  <!-- facilitator (solana) -->
  <g filter="url(#cardShadow)">
    <rect x="362" y="500" width="270" height="98" rx="14" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.09"/>
  </g>
  <text class="sans ctitle" x="386" y="540" font-size="17" font-weight="600">PayAI facilitator</text>
  <text class="mono csub" x="386" y="565" font-size="12.5">verifies + settles USDC,</text>
  <text class="mono csub" x="386" y="584" font-size="12.5">agent to treasury (gasless)</text>

  <!-- nosana: markets -->
  <g filter="url(#cardShadow)">
    <rect x="726" y="234" width="440" height="96" rx="14" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.09"/>
  </g>
  <text class="sans ctitle" x="750" y="274" font-size="17" font-weight="600">markets API</text>
  <text class="mono csub" x="750" y="299" font-size="12.5">live USD rate + on-chain queue depth</text>

  <!-- nosana: credits -->
  <g filter="url(#cardShadow)">
    <rect x="726" y="380" width="440" height="96" rx="14" fill="#fbfaf5" stroke="#1c1917" stroke-opacity="0.09"/>
  </g>
  <text class="sans ctitle" x="750" y="420" font-size="17" font-weight="600">credits ledger, client-manager</text>
  <text class="mono csub" x="750" y="445" font-size="12.5">Bearer nos_ key, jobs.list charges credits</text>

  <!-- nosana: gpu -->
  <g filter="url(#cardShadow)">
    <rect x="726" y="520" width="440" height="82" rx="14" fill="#fbfaf5" stroke="#25704f" stroke-opacity="0.34"/>
  </g>
  <text class="sans ctitle" x="750" y="557" font-size="17" font-weight="600">GPU host</text>
  <text class="mono csub" x="750" y="581" font-size="12.5">runs the container, returns the result</text>

  <!-- ============ numbered steps ============ -->
  <g>
    <circle cx="322" cy="328" r="11" fill="#1c1917"/>
    <text class="mono" x="322" y="332" font-size="12" fill="#f4f1e9" text-anchor="middle">1</text>
    <text class="mono steplabel" x="352" y="300" font-size="11.5" text-anchor="end">POST /rent</text>

    <circle cx="681" cy="300" r="11" fill="#1c1917"/>
    <text class="mono" x="681" y="304" font-size="12" fill="#f4f1e9" text-anchor="middle">2</text>
    <text class="mono steplabel" x="655" y="284" font-size="11.5">price</text>

    <circle cx="497" cy="435" r="11" fill="#1c1917"/>
    <text class="mono" x="497" y="439" font-size="12" fill="#f4f1e9" text-anchor="middle">3</text>
    <text class="mono steplabel" x="512" y="439" font-size="11.5">settle USDC</text>

    <circle cx="690" cy="405" r="11" fill="#1c1917"/>
    <text class="mono" x="690" y="409" font-size="12" fill="#f4f1e9" text-anchor="middle">4</text>
    <text class="mono steplabel" x="620" y="392" font-size="11.5">jobs.list</text>

    <circle cx="942" cy="498" r="11" fill="#1c1917"/>
    <text class="mono" x="942" y="502" font-size="12" fill="#f4f1e9" text-anchor="middle">5</text>
    <text class="mono steplabel" x="958" y="502" font-size="11.5">run</text>
  </g>

  <!-- ============ legend ============ -->
  <g>
    <rect x="56" y="666" width="14" height="14" rx="4" fill="#6b4fa6" fill-opacity="0.14" stroke="#6b4fa6" stroke-opacity="0.5"/>
    <text class="mono zonelabel" x="78" y="677" font-size="12" letter-spacing="0">this repo, the gateway</text>
    <rect x="290" y="666" width="14" height="14" rx="4" fill="#25704f" fill-opacity="0.12" stroke="#25704f" stroke-opacity="0.5"/>
    <text class="mono zonelabel" x="312" y="677" font-size="12" letter-spacing="0">Nosana, existing and unchanged</text>
    <rect x="606" y="666" width="14" height="14" rx="4" fill="#efece3" stroke="#1c1917" stroke-opacity="0.2"/>
    <text class="mono zonelabel" x="628" y="677" font-size="12" letter-spacing="0">Solana, payment settlement</text>
  </g>
</svg>
